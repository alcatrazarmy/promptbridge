<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PromptEngine</title>
<link rel="icon" type="image/svg+xml" href="icons/promptengine.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b;--panel:#111114;--card:#18181d;--card-h:#1e1e26;
  --bdr:#24242e;--bdr-h:#343440;
  --gold:#F5B800;--gold-soft:#ffd866;--gold-dim:#9e7600;
  --gold-g:rgba(245,184,0,.06);--gold-g2:rgba(245,184,0,.20);
  --tx:#e8e8ef;--tx2:#94949e;--tx3:#5a5a66;
  --r:14px;--rs:8px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* ============ DOCK ============ */
.dock {
  position:fixed;left:14px;top:50%;transform:translateY(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:4px;
}

.dock-brand {
  width:44px;height:44px;border-radius:12px;
  background:var(--panel);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:6px;position:relative;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.dock-brand::before {
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 35%,rgba(245,184,0,.07),transparent 70%);
}
.dock-brand svg{width:20px;height:20px}

.dock-div{width:24px;height:1px;background:var(--bdr);margin:4px 0}

/* Dynamic platform icons */
.di {
  width:44px;height:44px;border-radius:12px;
  background:var(--panel);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.di:hover {
  transform:scale(1.12);z-index:2;
  border-color:color-mix(in srgb, var(--p-color, #888) 40%, transparent);
  background:color-mix(in srgb, var(--p-color, #888) 6%, var(--panel));
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.di:active{transform:scale(1.04)}

.di-icon{display:flex;align-items:center;justify-content:center}
.di-icon svg{width:20px;height:20px}

.di-dot {
  position:absolute;right:-2px;top:50%;transform:translateY(-50%);
  width:4px;height:4px;border-radius:50%;opacity:0;transition:opacity .15s;
}
.di:hover .di-dot{opacity:1}

.di-tip {
  position:absolute;left:54px;top:50%;transform:translateY(-50%) translateX(-4px);
  background:var(--panel);border:1px solid var(--bdr);border-radius:8px;
  padding:6px 12px;white-space:nowrap;opacity:0;pointer-events:none;
  transition:all .15s;box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.di:hover .di-tip{opacity:1;transform:translateY(-50%) translateX(0)}
.di-tip-name{font-size:12px;font-weight:600;color:var(--tx)}
.di-tip-role{font-size:9px;color:var(--tx3);margin-top:1px}

/* ============ HERO ============ */
.center{display:flex;align-items:center;justify-content:center;height:100%;padding-left:80px}
.hero{text-align:center;max-width:420px}
.hero-title{font-size:28px;font-weight:700;color:var(--tx);letter-spacing:-.5px;line-height:1.3}
.hero-title span{color:var(--gold)}
.hero-sub{font-size:13px;color:var(--tx3);margin-top:10px;line-height:1.6}
.hero-keys{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.key{padding:4px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;font-size:10px;color:var(--tx3);font-family:'JetBrains Mono',monospace}

/* ============ MODAL ============ */
.mbg{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);backdrop-filter:blur(6px)}
.mbg.open{display:flex;align-items:center;justify-content:center;animation:mf .15s}
@keyframes mf{from{opacity:0}to{opacity:1}}

.mbox {
  width:660px;max-width:94vw;max-height:88vh;
  background:var(--panel);border:1px solid var(--bdr);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.6);animation:ms .2s cubic-bezier(.4,0,.2,1);
}
@keyframes ms{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bdr)}
.mhdr-l{display:flex;align-items:center;gap:10px}
.mhdr-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid transparent}
.mhdr-icon svg{width:18px;height:18px}
.mhdr-t{font-size:14px;font-weight:700;color:var(--tx)}
.mhdr-s{font-size:10px;color:var(--tx3);margin-left:6px;font-weight:400}

.mclose{width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-size:13px}
.mclose:hover{border-color:var(--bdr-h);color:var(--tx)}

.mbody{flex:1;overflow-y:auto;padding:20px}
.mbody::-webkit-scrollbar{width:4px}
.mbody::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

.lbl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.lbl-opt{font-weight:400;color:var(--tx3)}

.syb {
  background:var(--bg);border:1px solid var(--bdr);border-left:3px solid var(--gold);
  border-radius:var(--rs);padding:16px 18px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.75;
  color:var(--tx2);white-space:pre-wrap;margin-bottom:16px;max-height:300px;overflow-y:auto;
}
.syb::-webkit-scrollbar{width:3px}
.syb::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.syb .h{color:var(--gold);font-weight:500}
.syb .k{color:#6ea1ff}
.syb .n{color:#ff7b72}

.edt{width:100%;min-height:80px;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;color:var(--tx);resize:vertical;outline:none;transition:border-color .2s}
.edt:focus{border-color:rgba(245,184,0,.35)}
.edt::placeholder{color:var(--tx3)}

.sts{display:flex;gap:10px;margin-top:14px}
.st{flex:1;padding:10px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);text-align:center}
.st-v{font-size:17px;font-weight:700;color:var(--gold)}
.st-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.mfoot{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end}

.btn{padding:8px 18px;border-radius:var(--rs);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-p{background:var(--gold);color:var(--bg)}
.btn-p:hover{box-shadow:0 0 20px var(--gold-g2);transform:translateY(-1px)}
.btn-s{background:var(--card);color:var(--tx2);border:1px solid var(--bdr)}
.btn-s:hover{border-color:var(--bdr-h);color:var(--tx)}
.btn-t{background:transparent;color:var(--tx3)}
.btn-t:hover{color:var(--tx)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--panel);border:1px solid var(--gold-dim);color:var(--gold);padding:10px 22px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:99999;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- DOCK — rendered dynamically by loader.js -->
<div class="dock">
  <div class="dock-brand" id="dock-brand-icon"></div>
  <div class="dock-div"></div>
  <div id="dock-platforms"></div>
</div>

<!-- HERO -->
<div class="center">
  <div class="hero">
    <div class="hero-title">Prompt<span>Engine</span></div>
    <div class="hero-sub"><span id="hero-count">0</span> platforms loaded. Select from the dock to initialize a command role session.</div>
    <div class="hero-keys">
      <div class="key">Click icon → Preview</div>
      <div class="key">Copy → Paste</div>
      <div class="key">Esc → Close</div>
    </div>
  </div>
</div>

<!-- MODAL — populated dynamically -->
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mhdr">
      <div class="mhdr-l">
        <div class="mhdr-icon" id="m-icon"></div>
        <span class="mhdr-t" id="m-title"></span>
        <span class="mhdr-s">Command Role</span>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfoot" id="m-foot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="loader.js"></script>
</body>
</html>
