<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PromptEngine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111115'/%3E%3Cpath d='M16 4L20 14H12L16 4Z' fill='%23FFC028'/%3E%3Cpath d='M13 14L16 28L19 14H13Z' fill='%23FFD970'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --panel: #111114;
  --card: #18181d;
  --card-h: #1f1f27;
  --bdr: #26262f;
  --bdr-h: #353542;
  --gold: #F5B800;
  --gold-soft: #ffd866;
  --gold-dim: #9e7600;
  --gold-g: rgba(245,184,0,.06);
  --gold-g2: rgba(245,184,0,.18);
  --tx: #e8e8ef;
  --tx2: #94949e;
  --tx3: #5a5a66;
  --claude-bg: #D97757;
  --claude-soft: rgba(217,119,87,.10);
  --claude-bdr: rgba(217,119,87,.22);
  --gpt-bg: #10A37F;
  --gpt-soft: rgba(16,163,127,.10);
  --gpt-bdr: rgba(16,163,127,.22);
  --gemini-bg: #4285F4;
  --gemini-soft: rgba(66,133,244,.10);
  --gemini-bdr: rgba(66,133,244,.22);
  --cursor-bg: #9D5CFF;
  --cursor-soft: rgba(157,92,255,.10);
  --cursor-bdr: rgba(157,92,255,.22);
  --ollama-bg: #e8e8ef;
  --ollama-soft: rgba(255,255,255,.05);
  --ollama-bdr: rgba(255,255,255,.10);
  --r: 12px;
  --rs: 8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--tx); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

/* ================ SIDEBAR ICON ================ */
.sb {
  position:fixed; top:50%; left:14px; transform:translateY(-50%);
  z-index:9999; cursor:default;
}

.sb-btn {
  width:46px; height:46px; border-radius:13px;
  background:var(--panel); border:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.2);
  position:relative; overflow:hidden;
}

.sb-btn::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 30%, rgba(245,184,0,.08), transparent 70%);
  opacity:0; transition:opacity .3s;
}

.sb-btn:hover { border-color:rgba(245,184,0,.35); box-shadow:0 2px 8px rgba(0,0,0,.3), 0 4px 24px rgba(245,184,0,.08); }
.sb-btn:hover::before { opacity:1; }

.sb-btn svg { transition:transform .3s; }
.sb-btn:hover svg { transform:scale(1.06); }

/* ================ DROPDOWN ================ */
.dd {
  position:absolute; left:54px; top:50%; transform:translateY(-50%) translateX(-4px);
  opacity:0; pointer-events:none;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  width:300px; filter:drop-shadow(0 12px 40px rgba(0,0,0,.55));
}

.sb:hover .dd { opacity:1; pointer-events:auto; transform:translateY(-50%) translateX(0); }

.dd-box {
  background:var(--panel); border:1px solid var(--bdr);
  border-radius:14px; overflow:hidden;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}

.dd-top {
  padding:14px 16px 10px; border-bottom:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:space-between;
}

.dd-brand { display:flex; align-items:center; gap:8px; }

.dd-brand svg { opacity:.9; }

.dd-brand-text {
  font-size:12px; font-weight:700; letter-spacing:.8px;
  color:var(--tx); text-transform:uppercase;
}

.dd-version {
  font-size:9px; font-weight:500; color:var(--tx3);
  background:var(--card); padding:2px 6px; border-radius:4px;
  letter-spacing:.5px;
}

/* Platform Row */
.pl {
  display:flex; align-items:center; gap:12px;
  padding:10px 16px; cursor:pointer; transition:background .12s;
  position:relative;
}

.pl:hover { background:var(--card-h); }

.pl::after {
  content:''; position:absolute; bottom:0; left:16px; right:16px;
  height:1px; background:var(--bdr); opacity:.5;
}

.pl:last-child::after { display:none; }

/* Platform Icon */
.pi {
  width:34px; height:34px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:transform .15s;
}

.pl:hover .pi { transform:scale(1.06); }

.pi.claude { background:var(--claude-soft); border:1px solid var(--claude-bdr); }
.pi.gpt { background:var(--gpt-soft); border:1px solid var(--gpt-bdr); }
.pi.gemini { background:var(--gemini-soft); border:1px solid var(--gemini-bdr); }
.pi.cursor { background:var(--cursor-soft); border:1px solid var(--cursor-bdr); }
.pi.ollama { background:var(--ollama-soft); border:1px solid var(--ollama-bdr); }

.pl-info { flex:1; min-width:0; }

.pl-name { font-size:13px; font-weight:600; color:var(--tx); line-height:1.2; }

.pl-role {
  font-size:10px; color:var(--tx3); margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.pl-go {
  width:24px; height:24px; border-radius:6px; background:transparent;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}

.pl:hover .pl-go { background:var(--gold-g); }
.pl:hover .pl-go svg path { stroke:var(--gold); }

/* ================ MODAL ================ */
.modal-bg {
  display:none; position:fixed; inset:0; z-index:10000;
  background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
}

.modal-bg.open { display:flex; align-items:center; justify-content:center; animation:mFade .18s; }
@keyframes mFade { from{opacity:0} to{opacity:1} }

.modal {
  width:660px; max-width:94vw; max-height:88vh;
  background:var(--panel); border:1px solid var(--bdr);
  border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:mScale .22s cubic-bezier(.4,0,.2,1);
}

@keyframes mScale { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }

.modal-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--bdr);
}

.modal-hdr-left { display:flex; align-items:center; gap:10px; }

.modal-hdr-icon {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
}

.modal-hdr-title { font-size:14px; font-weight:700; color:var(--tx); }
.modal-hdr-sub { font-size:10px; color:var(--tx3); margin-left:6px; font-weight:400; }

.modal-close {
  width:28px; height:28px; border-radius:7px; border:1px solid var(--bdr);
  background:transparent; color:var(--tx3); cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:.15s;
  font-size:13px;
}
.modal-close:hover { border-color:var(--bdr-h); color:var(--tx); }

.modal-body { flex:1; overflow-y:auto; padding:20px; }
.modal-body::-webkit-scrollbar { width:4px; }
.modal-body::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }

.lbl {
  font-size:10px; font-weight:600; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--tx3); margin-bottom:8px;
}

.sys-block {
  background:var(--bg); border:1px solid var(--bdr); border-left:3px solid var(--gold);
  border-radius:var(--rs); padding:16px 18px;
  font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.75;
  color:var(--tx2); white-space:pre-wrap; margin-bottom:16px;
  max-height:300px; overflow-y:auto;
}

.sys-block::-webkit-scrollbar { width:3px; }
.sys-block::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }

.sys-block .h { color:var(--gold); font-weight:500; }
.sys-block .k { color:#6ea1ff; }
.sys-block .n { color:#ff7b72; }
.sys-block .d { color:var(--tx3); }

.editor {
  width:100%; min-height:80px; background:var(--bg);
  border:1px solid var(--bdr); border-radius:var(--rs);
  padding:14px 16px; font-family:'JetBrains Mono',monospace;
  font-size:11.5px; line-height:1.7; color:var(--tx);
  resize:vertical; outline:none; transition:border-color .2s;
}

.editor:focus { border-color:rgba(245,184,0,.35); }
.editor::placeholder { color:var(--tx3); }

.stats {
  display:flex; gap:10px; margin-top:14px;
}

.stat {
  flex:1; padding:10px; background:var(--card); border:1px solid var(--bdr);
  border-radius:var(--rs); text-align:center;
}

.stat-v { font-size:17px; font-weight:700; color:var(--gold); }
.stat-l { font-size:8px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.modal-foot {
  padding:14px 20px; border-top:1px solid var(--bdr);
  display:flex; gap:8px; justify-content:flex-end;
}

.btn {
  padding:8px 18px; border-radius:var(--rs); font-family:inherit;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; border:none;
}

.btn-p { background:var(--gold); color:var(--bg); }
.btn-p:hover { box-shadow:0 0 20px var(--gold-g2); transform:translateY(-1px); }
.btn-s { background:var(--card); color:var(--tx2); border:1px solid var(--bdr); }
.btn-s:hover { border-color:var(--bdr-h); color:var(--tx); }
.btn-t { background:transparent; color:var(--tx3); }
.btn-t:hover { color:var(--tx); }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(12px);
  background:var(--panel); border:1px solid var(--gold-dim);
  color:var(--gold); padding:10px 22px; border-radius:10px;
  font-size:12px; font-weight:600; opacity:0; pointer-events:none;
  transition:all .25s; z-index:99999;
  box-shadow:0 4px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(245,184,0,.05);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ====== SIDEBAR ICON ====== -->
<div class="sb" id="sb">
  <div class="sb-btn" id="sbBtn">
    <!-- Custom PromptEngine bolt icon — crisp geometric SVG -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L4.5 14H12L11 22L19.5 10H12L13 2Z" fill="url(#boltGrad)" stroke="url(#boltStroke)" stroke-width=".5" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="boltGrad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FFD866"/>

        <linearGradient id="boltStroke" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">

      </defs>
    </svg>
  </div>

  <!-- ====== HOVER DROPDOWN ====== -->
  <div class="dd">
    <div class="dd-box">
      <div class="dd-top">
        <div class="dd-brand">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 14H12L11 22L19.5 10H12L13 2Z" fill="#F5B800"/></svg>
          <span class="dd-brand-text">PromptEngine</span>
        </div>
        <span class="dd-version">v2.0</span>
      </div>

      <!-- Claude -->
      <div class="pl" onclick="open_('claude')">
        <div class="pi claude">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="none" stroke="#D97757" stroke-width="1.5"/>

        <div class="pl-go"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#5a5a66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>

      <!-- ChatGPT -->
      <div class="pl" onclick="open_('chatgpt')">
        <div class="pi gpt">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.28 10.85a6.14 6.14 0 00-.53-5.06 6.2 6.2 0 00-6.7-2.97A6.15 6.15 0 0010.5.84a6.2 6.2 0 00-5.94 4.33 6.14 6.14 0 00-4.1 3A6.2 6.2 0 001.23 14a6.14 6.14 0 00.53 5.05 6.2 6.2 0 006.7 2.97 6.15 6.15 0 004.55 1.98 6.2 6.2 0 005.94-4.33 6.14 6.14 0 004.1-3 6.2 6.2 0 00-.77-5.82z" fill="none" stroke="#10A37F" stroke-width="1.3"/>
            <path d="M12 8v8M8.5 10l3.5 2 3.5-2M8.5 14l3.5-2 3.5 2" stroke="#10A37F" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="pl-info"><div class="pl-name">ChatGPT</div><div class="pl-role">Strategic Coordinator</div></div>
        <div class="pl-go"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#5a5a66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>

      <!-- Gemini -->
      <div class="pl" onclick="open_('gemini')">
        <div class="pi gemini">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2a10 10 0 00-3.16 19.5c.13-.9.25-2.3-.05-3.29-.27-.9-1.74-5.72-1.74-5.72a4.3 4.3 0 01-.35-1.76c0-1.65.96-2.88 2.15-2.88a1.5 1.5 0 011.5 1.66c0 1-.65 2.52-.98 3.92a1.72 1.72 0 001.75 2.14c2.1 0 3.72-2.22 3.72-5.42 0-2.84-2.04-4.82-4.95-4.82a5.42 5.42 0 00-5.65 5.44 4.83 4.83 0 00.92 2.84.38.38 0 01.09.36c-.1.38-.31 1.23-.35 1.4-.06.23-.18.28-.42.17C3.02 14.43 2 12.17 2 9.5 2 5.36 5.84 1.58 12.26 1.58c5.05 0 8.97 3.6 8.97 8.4 0 5.02-3.16 9.05-7.56 9.05a3.9 3.9 0 01-2.87-1.44l-.78 2.98a11.28 11.28 0 01-1.06 2.93A10 10 0 0012 22a10 10 0 000-20z" fill="none" stroke="#4285F4" stroke-width="1"/>

      <!-- Ollama -->
      <div class="pl" onclick="open_('ollama')">
        <div class="pi ollama">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" fill="none" stroke="#999" stroke-width="1.3"/>
            <path d="M12 7v5l3 3" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- ====== MODAL ====== -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="modal-hdr-icon" id="mIcon"></div>
        <span class="modal-hdr-title" id="mTitle"></span>
        <span class="modal-hdr-sub" id="mSub">Command Role</span>
      </div>
      <button class="modal-close" onclick="closeM()">✕</button>

<div class="toast" id="toast"></div>

<script>
const P = {
  claude: {
    name:'Claude', cls:'claude', color:'#D97757',
    url:'https://claude.ai/new',
    sys: `SYSTEM MODE: COMMAND ROLE

Claude acts as a strategic AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, decisions, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation.

WORKFLOW
1. Decide next task.
2. Generate prompt for AI coding tools.
3. Send task to Cursor or Gemini.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },
  chatgpt: {
    name:'ChatGPT', cls:'gpt', color:'#10A37F',
    url:'https://chatgpt.com/',
    sys: `SYSTEM MODE: COMMAND ROLE

ChatGPT acts as a strategic AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, decisions, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation.

WORKFLOW
1. Decide next task.
2. Generate prompt for AI coding tools.
3. Send task to Cursor or Gemini.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },
  gemini: {
    name:'Gemini', cls:'gemini', color:'#4285F4',
    url:'https://gemini.google.com/app',
    sys: `SYSTEM MODE: COMMAND ROLE

Gemini acts as a research-first AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, research findings, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation. Cite sources when possible.

WORKFLOW
1. Research and analyze.
2. Decide next task.
3. Generate prompt for AI coding tools.
4. Send task to Cursor or Claude.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },
  cursor: {
    name:'Cursor', cls:'cursor', color:'#9D5CFF',
    url:'',
    sys: `SYSTEM MODE: COMMAND ROLE — CODE EXECUTION

Cursor acts as the primary code execution agent.

RULES
1. Write production-ready code only.
2. No discussion unless clarification is needed.
3. Follow the prompt exactly as given.
4. Include error handling and types.
5. Test-ready output.

WORKFLOW
1. Receive task prompt from coordinator.
2. Write code.
3. Return completed module.

OUTPUT FORMAT
- File path
- Code
- Dependencies (if any)
- Status: DONE | BLOCKED (reason)`
  },
  ollama: {
    name:'Ollama', cls:'ollama', color:'#ccc',
    url:'',
    sys: `SYSTEM MODE: COMMAND ROLE — LOCAL EXECUTION

Local model acts as a fast-response utility agent.

RULES
1. No coding unless explicitly requested.
2. Prioritize speed over perfection.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. No disclaimers or hedging.

WORKFLOW
1. Receive task.
2. Execute with minimal overhead.
3. Return structured result.

OUTPUT FORMAT
- Decision
- Task
- Result
- Next Step`
  }
};

function open_(k) {
  const p = P[k]; if (!p) return;
  const m = document.getElementById('modal');
  document.getElementById('mIcon').className = `modal-hdr-icon pi ${p.cls}`;
  document.getElementById('mIcon').innerHTML = document.querySelector(`.pl .pi.${p.cls}`).innerHTML;
  document.getElementById('mTitle').textContent = p.name;

  const hl = p.sys
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(SYSTEM MODE:.*)/gm,'<span class="h">$1</span>')
    .replace(/^(RULES|WORKFLOW|OUTPUT FORMAT|ADDITIONAL CONTEXT)/gm,'<span class="h">$1</span>')
    .replace(/^(\d+\.)/gm,'<span class="n">$1</span>')
    .replace(/^(- )/gm,'<span class="k">- </span>');

  document.getElementById('mBody').innerHTML = `
    <div class="lbl">System Prompt</div>
    <div class="sys-block">${hl}</div>
    <div class="lbl">Additional Context <span style="font-weight:400;color:var(--tx3)">(optional)</span></div>
    <textarea class="editor" id="extra" placeholder="Project details, constraints, additional instructions..."></textarea>
    <div class="stats">
      <div class="stat"><div class="stat-v">${p.sys.split('\n').length}</div><div class="stat-l">Lines</div></div>
      <div class="stat"><div class="stat-v">${p.sys.length}</div><div class="stat-l">Characters</div></div>
      <div class="stat"><div class="stat-v" style="color:${p.color}">●</div><div class="stat-l">Ready</div></div>
    </div>`;

  document.getElementById('mFoot').innerHTML = `
    <button class="btn btn-t" onclick="closeM()">Cancel</button>
    <button class="btn btn-s" onclick="copy_('${k}')">Copy Prompt</button>
    ${p.url ? `<button class="btn btn-p" onclick="launch_('${k}')">Open ${p.name} →</button>` : ''}`;

  m.classList.add('open');
}

function closeM() { document.getElementById('modal').classList.remove('open'); }

function copy_(k) {
  const p = P[k];
  let t = p.sys;
  const ex = document.getElementById('extra');
  if (ex && ex.value.trim()) t += '\n\nADDITIONAL CONTEXT:\n' + ex.value.trim();
  navigator.clipboard.writeText(t).then(() => toast_('Copied to clipboard')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast_('Copied');
  });
}

function launch_(k) { copy_(k); const p = P[k]; if (p.url) setTimeout(() => window.open(p.url,'_blank'), 250); }

function toast_(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeM(); });
</script>
</body>
</html>
