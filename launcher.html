<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PromptEngine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23111'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='%23FFC028'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --panel: #141418;
  --card: #1a1a21;
  --card-hover: #22222c;
  --bdr: #2a2a35;
  --bdr-lit: #3a3a48;
  --gold: #FFC028;
  --gold-dim: #c49500;
  --gold-glow: rgba(255,192,40,.08);
  --gold-hot: rgba(255,192,40,.25);
  --tx: #e0e0e8;
  --tx2: #9090a0;
  --tx3: #606070;
  --claude: #D97757;
  --gpt: #10A37F;
  --gemini: #4285F4;
  --cursor: #9D5CFF;
  --ollama: #FFFFFF;
  --r: 12px;
  --r-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--tx); font-family:'DM Sans',sans-serif; }

/* ============ SIDEBAR ICON (fixed left) ============ */
.sidebar-icon {
  position: fixed;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  z-index: 9999;
  cursor: pointer;
}

.icon-btn {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #1a1a21, #141418);
  border: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
  position: relative;
}

.icon-btn::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 15px;
  background: linear-gradient(135deg, var(--gold), transparent 60%);
  opacity: 0;
  z-index: -1;
  transition: opacity .3s;
}

.icon-btn:hover {
  border-color: var(--gold);
  transform: scale(1.08);
  box-shadow: 0 4px 24px rgba(255,192,40,.15);
}

.icon-btn:hover::after { opacity: .3; }

.icon-bolt {
  font-size: 22px;
  filter: drop-shadow(0 0 6px rgba(255,192,40,.4));
  transition: transform .3s;
}

.sidebar-icon:hover .icon-bolt { transform: rotate(-12deg) scale(1.1); }

/* ============ DROPDOWN ============ */
.dropdown {
  position: absolute;
  left: 56px;
  top: 50%;
  transform: translateY(-50%) scale(.92);
  opacity: 0;
  pointer-events: none;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  width: 280px;
}

.sidebar-icon:hover .dropdown,
.dropdown.pinned {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) scale(1);
}

.dd-inner {
  background: var(--panel);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
  overflow: hidden;
}

.dd-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--bdr);
}

.dd-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
}

.dd-sub {
  font-size: 10px;
  color: var(--tx3);
  margin-top: 2px;
}

/* Platform items */
.platform {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all .15s;
  border-bottom: 1px solid rgba(42,42,53,.5);
  position: relative;
}

.platform:last-child { border-bottom: none; }

.platform:hover {
  background: var(--card-hover);
}

.platform:active {
  background: var(--gold-glow);
}

.p-icon {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
  transition: transform .15s;
}

.platform:hover .p-icon { transform: scale(1.1); }

.p-icon.claude { background: rgba(217,119,87,.12); color: var(--claude); border: 1px solid rgba(217,119,87,.2); }
.p-icon.gpt { background: rgba(16,163,127,.12); color: var(--gpt); border: 1px solid rgba(16,163,127,.2); }
.p-icon.gemini { background: rgba(66,133,244,.12); color: var(--gemini); border: 1px solid rgba(66,133,244,.2); }
.p-icon.cursor { background: rgba(157,92,255,.12); color: var(--cursor); border: 1px solid rgba(157,92,255,.2); }
.p-icon.ollama { background: rgba(255,255,255,.06); color: var(--ollama); border: 1px solid rgba(255,255,255,.1); }

.p-info { flex: 1; min-width: 0; }

.p-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx);
  line-height: 1.2;
}

.p-desc {
  font-size: 10px;
  color: var(--tx3);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.p-arrow {
  color: var(--tx3);
  font-size: 12px;
  transition: transform .15s, color .15s;
}

.platform:hover .p-arrow {
  transform: translateX(3px);
  color: var(--gold);
}

/* Status dot */
.p-status {
  position: absolute;
  top: 10px;
  right: 36px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gpt);
  opacity: .6;
}

/* ============ MAIN PANEL (opens on click) ============ */
.main-panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 10000;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: fadeIn .2s;
}

.main-panel.open { display: flex; align-items: center; justify-content: center; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.panel-box {
  width: 680px;
  max-width: 95vw;
  max-height: 90vh;
  background: var(--panel);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: scaleIn .25s cubic-bezier(.4,0,.2,1);
}

@keyframes scaleIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--bdr);
}

.panel-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-platform-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.panel-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--tx);
}

.panel-close {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  border: 1px solid var(--bdr);
  background: transparent;
  color: var(--tx3);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .15s;
}

.panel-close:hover { border-color: var(--gold); color: var(--gold); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

/* System prompt display */
.sys-prompt {
  background: var(--bg);
  border: 1px solid var(--bdr);
  border-left: 3px solid var(--gold);
  border-radius: var(--r-sm);
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--tx2);
  white-space: pre-wrap;
  margin-bottom: 16px;
}

.sys-prompt .hl { color: var(--gold); font-weight: 500; }
.sys-prompt .kw { color: #5588ff; }
.sys-prompt .num { color: #ff7b72; }

.section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tx3);
  margin-bottom: 8px;
}

/* Action buttons */
.panel-actions {
  padding: 14px 20px;
  border-top: 1px solid var(--bdr);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn {
  padding: 8px 18px;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: .15s;
  border: none;
}

.btn-primary {
  background: var(--gold);
  color: var(--bg);
}

.btn-primary:hover {
  box-shadow: 0 0 20px var(--gold-hot);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--card);
  color: var(--tx2);
  border: 1px solid var(--bdr);
}

.btn-secondary:hover {
  border-color: var(--bdr-lit);
  color: var(--tx);
}

.btn-link {
  background: transparent;
  color: var(--tx3);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.btn-link:hover { color: var(--tx); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  z-index: 99999;
  box-shadow: 0 4px 20px rgba(255,192,40,.15);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Custom prompt editor */
.editor-area {
  width: 100%;
  min-height: 120px;
  background: var(--bg);
  border: 1px solid var(--bdr);
  border-radius: var(--r-sm);
  padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--tx);
  resize: vertical;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 12px;
}

.editor-area:focus { border-color: var(--gold); }

/* Quick stats row */
.stat-row {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}

.stat {
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: var(--r-sm);
  flex: 1;
  text-align: center;
}

.stat-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
}

.stat-label {
  font-size: 9px;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}
</style>
</head>
<body>

<!-- SIDEBAR ICON -->
<div class="sidebar-icon" id="sidebarIcon">
  <div class="icon-btn">
    <span class="icon-bolt">⚡</span>
  </div>

  <!-- HOVER DROPDOWN -->
  <div class="dropdown" id="dropdown">
    <div class="dd-inner">
      <div class="dd-header">
        <div class="dd-title">PromptEngine</div>
        <div class="dd-sub">Select platform to initialize</div>
      </div>

      <div class="platform" onclick="openPlatform('claude')">
        <div class="p-icon claude">C</div>
        <div class="p-info">
          <div class="p-name">Claude</div>
          <div class="p-desc">Command Role • Coordinator</div>
        </div>
        <div class="p-status" style="background:var(--claude)"></div>
        <span class="p-arrow">→</span>
      </div>

      <div class="platform" onclick="openPlatform('chatgpt')">
        <div class="p-icon gpt">G</div>
        <div class="p-info">
          <div class="p-name">ChatGPT</div>
          <div class="p-desc">Command Role • Coordinator</div>
        </div>
        <div class="p-status" style="background:var(--gpt)"></div>
        <span class="p-arrow">→</span>
      </div>

      <div class="platform" onclick="openPlatform('gemini')">
        <div class="p-icon gemini">G</div>
        <div class="p-info">
          <div class="p-name">Gemini</div>
          <div class="p-desc">Command Role • Research</div>
        </div>
        <div class="p-status" style="background:var(--gemini)"></div>
        <span class="p-arrow">→</span>
      </div>

      <div class="platform" onclick="openPlatform('cursor')">
        <div class="p-icon cursor">Cu</div>
        <div class="p-info">
          <div class="p-name">Cursor</div>
          <div class="p-desc">Command Role • Coder</div>
        </div>
        <div class="p-status" style="background:var(--cursor)"></div>
        <span class="p-arrow">→</span>
      </div>

      <div class="platform" onclick="openPlatform('ollama')">
        <div class="p-icon ollama">⚙</div>
        <div class="p-info">
          <div class="p-name">Ollama (Local)</div>
          <div class="p-desc">Command Role • Local GPU</div>
        </div>
        <span class="p-arrow">→</span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN PANEL (modal) -->
<div class="main-panel" id="mainPanel" onclick="if(event.target===this)closePanel()">
  <div class="panel-box">
    <div class="panel-header">
      <div class="panel-title-row">
        <div class="panel-platform-icon" id="panelIcon"></div>
        <span class="panel-title" id="panelTitle"></span>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-actions" id="panelActions"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =====================================================
// SYSTEM PROMPTS — per platform
// =====================================================
const PROMPTS = {
  claude: {
    name: 'Claude',
    icon: 'C',
    iconClass: 'claude',
    color: '#D97757',
    url: 'https://claude.ai/new',
    system: `SYSTEM MODE: COMMAND ROLE

Claude acts as a strategic AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, decisions, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation.

WORKFLOW
1. Decide next task.
2. Generate prompt for AI coding tools.
3. Send task to Cursor or Gemini.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },

  chatgpt: {
    name: 'ChatGPT',
    icon: 'G',
    iconClass: 'gpt',
    color: '#10A37F',
    url: 'https://chatgpt.com/',
    system: `SYSTEM MODE: COMMAND ROLE

ChatGPT acts as a strategic AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, decisions, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation.

WORKFLOW
1. Decide next task.
2. Generate prompt for AI coding tools.
3. Send task to Cursor or Gemini.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },

  gemini: {
    name: 'Gemini',
    icon: 'G',
    iconClass: 'gemini',
    color: '#4285F4',
    url: 'https://gemini.google.com/app',
    system: `SYSTEM MODE: COMMAND ROLE

Gemini acts as a research-first AI coordinator.

RULES
1. No coding unless explicitly requested.
2. Only discuss architecture, research, and task prompts.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. Avoid speculation. Cite sources when possible.

WORKFLOW
1. Research and analyze.
2. Decide next task.
3. Generate prompt for AI coding tools.
4. Send task to Cursor or Claude.

OUTPUT FORMAT
- Decision
- Task
- Prompt
- Next Step`
  },

  cursor: {
    name: 'Cursor',
    icon: 'Cu',
    iconClass: 'cursor',
    color: '#9D5CFF',
    url: '',
    system: `SYSTEM MODE: COMMAND ROLE — CODE EXECUTION

Cursor acts as the primary code execution agent.

RULES
1. Write production-ready code only.
2. No discussion unless clarification is needed.
3. Follow the prompt exactly as given.
4. Include error handling and types.
5. Test-ready output.

WORKFLOW
1. Receive task prompt from coordinator.
2. Write code.
3. Return completed module.

OUTPUT FORMAT
- File path
- Code
- Dependencies (if any)
- Status: DONE / BLOCKED (reason)`
  },

  ollama: {
    name: 'Ollama (Local)',
    icon: '⚙',
    iconClass: 'ollama',
    color: '#FFFFFF',
    url: '',
    system: `SYSTEM MODE: COMMAND ROLE — LOCAL EXECUTION

Local model acts as a fast-response utility agent.

RULES
1. No coding unless explicitly requested.
2. Prioritize speed over perfection.
3. Output must be structured and direct.
4. Focus on next executable step only.
5. No disclaimers or hedging.

WORKFLOW
1. Receive task.
2. Execute with minimal overhead.
3. Return structured result.

OUTPUT FORMAT
- Decision
- Task
- Result
- Next Step`
  }
};

// =====================================================
// PANEL LOGIC
// =====================================================
function openPlatform(key) {
  const p = PROMPTS[key];
  if (!p) return;

  const panel = document.getElementById('mainPanel');
  const icon = document.getElementById('panelIcon');
  const title = document.getElementById('panelTitle');
  const body = document.getElementById('panelBody');
  const actions = document.getElementById('panelActions');

  icon.textContent = p.icon;
  icon.className = `panel-platform-icon p-icon ${p.iconClass}`;
  title.textContent = p.name + ' — Command Role';

  // Syntax highlight the system prompt
  const highlighted = highlightPrompt(p.system);

  body.innerHTML = `
    <div class="section-label">System Prompt</div>
    <div class="sys-prompt">${highlighted}</div>

    <div class="section-label">Custom Addition (optional)</div>
    <textarea class="editor-area" id="customAddition" placeholder="Add context, project details, or additional instructions..."></textarea>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-val">${p.system.split('\n').length}</div>
        <div class="stat-label">Lines</div>
      </div>
      <div class="stat">
        <div class="stat-val">${p.system.length}</div>
        <div class="stat-label">Chars</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:${p.color}">●</div>
        <div class="stat-label">Ready</div>
      </div>
    </div>
  `;

  actions.innerHTML = `
    <button class="btn btn-link" onclick="closePanel()">Cancel</button>
    <button class="btn btn-secondary" onclick="copyPrompt('${key}')">Copy Prompt</button>
    ${p.url ? `<button class="btn btn-primary" onclick="launchPlatform('${key}')">Open ${p.name} →</button>` : ''}
  `;

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('mainPanel').classList.remove('open');
}

function copyPrompt(key) {
  const p = PROMPTS[key];
  let text = p.system;
  const custom = document.getElementById('customAddition');
  if (custom && custom.value.trim()) {
    text += '\n\nADDITIONAL CONTEXT:\n' + custom.value.trim();
  }
  navigator.clipboard.writeText(text).then(() => {
    showToast('Prompt copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Prompt copied');
  });
}

function launchPlatform(key) {
  const p = PROMPTS[key];
  copyPrompt(key);
  if (p.url) {
    setTimeout(() => window.open(p.url, '_blank'), 300);
  }
}

function highlightPrompt(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^(SYSTEM MODE:.*)/gm, '<span class="hl">$1</span>')
    .replace(/^(RULES|WORKFLOW|OUTPUT FORMAT|ADDITIONAL CONTEXT)/gm, '<span class="hl">$1</span>')
    .replace(/^(\d+\.)/gm, '<span class="num">$1</span>')
    .replace(/^(- )/gm, '<span class="kw">- </span>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Keyboard shortcut: Escape closes panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
</script>
</body>
</html>
